version: 1
interactions:
- request:
    method: POST
    uri: https://api.openai.com/v1/embeddings
    headers:
      Host:
      - api.openai.com
      Accept-Encoding:
      - gzip, deflate, zstd
      Connection:
      - keep-alive
      Accept:
      - application/json
      Content-Type:
      - application/json
      User-Agent:
      - OpenAI/Python 2.24.0
    parsed_body:
      input:
      - test
      model: text-embedding-3-small
      encoding_format: base64
  response:
    status:
      code: 200
      message: OK
    headers:
      Content-Type:
      - application/json
      Transfer-Encoding:
      - chunked
      Connection:
      - keep-alive
      Server:
      - cloudflare
      Strict-Transport-Security:
      - max-age=31536000; includeSubDomains; preload
      Access-Control-Expose-Headers:
      - CF-Ray
      alt-svc:
      - h3=":443"; ma=86400
    body:
      parsed_body:
        object: list
        data:
        - object: embedding
          embedding: 
          index: 0
        model: text-embedding-3-small
        usage:
          prompt_tokens: 1
          total_tokens: 1
