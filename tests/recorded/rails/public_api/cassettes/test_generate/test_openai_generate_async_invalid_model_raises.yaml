version: 1
interactions:
- request:
    method: POST
    uri: https://api.openai.com/v1/chat/completions
    headers:
      Host:
      - api.openai.com
      Accept:
      - '*/*'
      Accept-Encoding:
      - gzip, deflate, zstd
      Connection:
      - keep-alive
      User-Agent:
      - python-httpx/0.28.1
      Content-Type:
      - application/json
    parsed_body:
      model: gpt-nonexistent-test-model
      messages:
      - role: user
        content: Say a short safe greeting.
  response:
    status:
      code: 404
      message: Not Found
    headers:
      Content-Type:
      - application/json; charset=utf-8
      Transfer-Encoding:
      - chunked
      Connection:
      - keep-alive
      Server:
      - cloudflare
      Strict-Transport-Security:
      - max-age=31536000; includeSubDomains; preload
      Vary:
      - Origin
      Access-Control-Expose-Headers:
      - CF-Ray
      - CF-Ray
      alt-svc:
      - h3=":443"; ma=86400
    body:
      parsed_body:
        error:
          message: The model `gpt-nonexistent-test-model` does not exist or you do not have access to it.
          type: invalid_request_error
          param: null
          code: model_not_found
