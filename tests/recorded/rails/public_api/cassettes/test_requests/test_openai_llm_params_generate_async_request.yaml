version: 1
interactions:
- request:
    method: POST
    uri: https://api.openai.com/v1/chat/completions
    headers:
      Host:
      - api.openai.com
      Accept:
      - '*/*'
      Accept-Encoding:
      - gzip, deflate, zstd
      Connection:
      - keep-alive
      User-Agent:
      - python-httpx/0.28.1
      Content-Type:
      - application/json
    parsed_body:
      model: gpt-5.4-nano
      messages:
      - role: user
        content: Reply with one short greeting.
      max_completion_tokens: 8
  response:
    status:
      code: 200
      message: OK
    headers:
      Content-Type:
      - application/json
      Transfer-Encoding:
      - chunked
      Connection:
      - keep-alive
      Server:
      - cloudflare
      Strict-Transport-Security:
      - max-age=31536000; includeSubDomains; preload
      Access-Control-Expose-Headers:
      - CF-Ray
      alt-svc:
      - h3=":443"; ma=86400
    body:
      parsed_body:
        id: '[RECORDED_RESPONSE_ID]'
        object: chat.completion
        created: 0
        model: gpt-5.4-nano-2026-03-17
        choices:
        - index: 0
          message:
            role: assistant
            content: Hello!
            refusal: null
            annotations: []
          finish_reason: stop
        usage:
          prompt_tokens: 12
          completion_tokens: 5
          total_tokens: 17
          prompt_tokens_details:
            cached_tokens: 0
            audio_tokens: 0
          completion_tokens_details:
            reasoning_tokens: 0
            audio_tokens: 0
            accepted_prediction_tokens: 0
            rejected_prediction_tokens: 0
        service_tier: default
        system_fingerprint: null
