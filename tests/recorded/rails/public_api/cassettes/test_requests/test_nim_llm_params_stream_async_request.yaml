version: 1
interactions:
- request:
    method: POST
    uri: https://integrate.api.nvidia.com/v1/chat/completions
    headers:
      Host:
      - integrate.api.nvidia.com
      Accept:
      - '*/*'
      Accept-Encoding:
      - gzip, deflate, zstd
      Connection:
      - keep-alive
      User-Agent:
      - python-httpx/0.28.1
      Content-Type:
      - application/json
    parsed_body:
      model: nvidia/nemotron-3-nano-30b-a3b
      messages:
      - role: user
        content: Reply with one short greeting.
      stream: true
      stream_options:
        include_usage: true
      temperature: 0.0
      max_tokens: 32
      chat_template_kwargs:
        enable_thinking: false
  response:
    status:
      code: 200
      message: OK
    headers:
      Content-Type:
      - text/event-stream; charset=utf-8
      Transfer-Encoding:
      - chunked
      Connection:
      - keep-alive
      Access-Control-Expose-Headers:
      - nvcf-reqid
      Nvcf-Status:
      - fulfilled
      Server:
      - uvicorn
      Vary:
      - Origin
    body:
      parsed_body:
      - id: '[RECORDED_RESPONSE_ID]'
        object: chat.completion.chunk
        created: 0
        model: nvidia/nemotron-3-nano-30b-a3b
        choices:
        - index: 0
          delta:
            role: assistant
            content: ''
          logprobs: null
          finish_reason: null
        prompt_token_ids: null
      - id: '[RECORDED_RESPONSE_ID]'
        object: chat.completion.chunk
        created: 0
        model: nvidia/nemotron-3-nano-30b-a3b
        choices:
        - index: 0
          delta:
            content: Hello
          logprobs: null
          finish_reason: null
          token_ids: null
      - id: '[RECORDED_RESPONSE_ID]'
        object: chat.completion.chunk
        created: 0
        model: nvidia/nemotron-3-nano-30b-a3b
        choices:
        - index: 0
          delta:
            content: '!'
          logprobs: null
          finish_reason: stop
          stop_reason: null
          token_ids: null
      - id: '[RECORDED_RESPONSE_ID]'
        object: chat.completion.chunk
        created: 0
        model: nvidia/nemotron-3-nano-30b-a3b
        choices: []
        usage:
          prompt_tokens: 22
          total_tokens: 25
          completion_tokens: 3
      - '[DONE]'
