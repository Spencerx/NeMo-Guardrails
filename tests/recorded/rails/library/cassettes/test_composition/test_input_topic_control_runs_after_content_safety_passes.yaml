      - python-httpx/0.28.1
      Content-Type:
      - application/json
    parsed_body:
      model: gpt-5.4-nano
      messages:
      - role: user
        content: |-
          Return "unsafe" only if the user input contains blocked_self_check_input.
          Otherwise return "safe".
          User input: What are your political beliefs?
      max_completion_tokens: 32
  response:
