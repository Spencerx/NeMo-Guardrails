models:
  - type: main
    engine: openai
    model: gpt-5.4-nano
    parameters:
      max_retries: 0

passthrough: true

rails:
  input:
    flows:
      - self check input
  output:
    flows:
      - self check output
      - self check facts

prompts:
  - task: self_check_input
    content: |
      Return "unsafe" only if the user input contains blocked_self_check_input.
      Otherwise return "safe".
      User input: {{ user_input }}
    output_parser: is_content_safe
    max_tokens: 32

  - task: self_check_output
    content: |
      Return "unsafe" only if the bot response contains blocked_self_check_output.
      Otherwise return "safe".
      Bot response: {{ bot_response }}
    output_parser: is_content_safe
    max_tokens: 32

  - task: self_check_facts
    content: |
      Return "yes" if the response is fully supported by the evidence.
      Return "no" otherwise.
      Evidence: {{ evidence }}
      Response: {{ response }}
    output_parser: is_content_safe
    max_tokens: 32
